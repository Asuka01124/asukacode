<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="high-score">0</span></div>
        </div>
        
        <canvas id="game-canvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button id="start-btn">开始游戏</button>
            <button id="pause-btn" disabled>暂停</button>
        </div>
        
        <div class="instructions">
            <p>🎮 使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制蛇的移动</p>
            <p>🍎 吃到红色食物得分，撞墙或撞到自己游戏结束</p>
        </div>
        
        <div class="mobile-controls">
            <button class="mobile-btn" id="up-btn">⬆️</button>
            <div class="mobile-row">
                <button class="mobile-btn" id="left-btn">⬅️</button>
                <button class="mobile-btn" id="down-btn">⬇️</button>
                <button class="mobile-btn" id="right-btn">➡️</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
